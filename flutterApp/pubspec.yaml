name: graduators
description: "Graduators - Technical Recruitment & Graduate Verification Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: 3.0.2
  go_router: ^17.0.0
  dio: ^5.9.2
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  lottie: ^3.3.1
  fl_chart: ^1.1.0
  cached_network_image: ^3.4.1
  image_picker: ^1.2.1
  file_picker: ^11.0.2
  flutter_svg: ^2.2.2
  intl: ^0.19.0
  url_launcher: ^6.3.2
  share_plus: ^12.0.2
  path_provider: ^2.1.5
  connectivity_plus: ^7.1.1
  permission_handler: ^12.0.3
  device_info_plus: ^12.4.0
  package_info_plus: ^9.0.1
  json_annotation: ^4.9.0
  equatable: ^2.0.8
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  json_serializable: ^6.9.5
  build_runner: ^2.5.4
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/rive/
    - assets/fonts/
